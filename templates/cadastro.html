<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto - Campo Direto</title>
</head>
<body>
    <h1>Anunciar Novo Produto</h1>
    <form method="POST">
    <label>Nome do Produto:</label><br>
    <input type="text" name="nome" required><br><br>

    <label>Preço (R$):</label><br>
    <input type="number" step="0.01" name="preco" required><br><br>

    <label>Nome do Vendedor:</label><br>
    <input type="text" name="contato_nome" required><br><br>

    <label>WhatsApp (com DDD):</label><br>
    <input type="text" name="whatsapp" placeholder="319XXXXXXXX" required><br><br>

    <label>Descrição:</label><br>
    <textarea name="descricao"></textarea><br><br>

    <button type="submit">Publicar Anúncio</button>
</form>
    <br>
    <a href="/">Voltar para Início</a>
</body>
</html>
